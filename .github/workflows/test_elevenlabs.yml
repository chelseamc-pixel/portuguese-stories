name: Test ElevenLabs Audio

on:
  workflow_dispatch:
    inputs:
      voice_id:
        description: 'ElevenLabs voice ID to test (blank = use ELEVENLABS_VOICE_ID secret or default)'
        required: false
        type: string
        default: ''

jobs:
  test-audio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ElevenLabs audio test
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ github.event.inputs.voice_id || secrets.ELEVENLABS_VOICE_ID }}
        run: python scripts/tests/test_elevenlabs.py
